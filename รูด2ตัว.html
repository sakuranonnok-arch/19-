<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รูด 2 ตัว | Neumorphism Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;700;900&display=swap');
        body { font-family: 'Prompt', sans-serif; background-color: #e2e8f0; }
        
        /* Neumorphism Styles */
        .neumo-card { background: #e2e8f0; box-shadow: 8px 8px 16px #bcbfc4, -8px -8px 16px #ffffff; border-radius: 30px; }
        .neumo-input { background: #e2e8f0; box-shadow: inset 4px 4px 8px #bcbfc4, inset -4px -4px 8px #ffffff; }
        .neumo-btn { background: #e2e8f0; box-shadow: 4px 4px 8px #bcbfc4, -8px -8px 8px #ffffff; transition: 0.2s; }
        .neumo-btn:active { box-shadow: inset 4px 4px 8px #bcbfc4, inset -4px -4px 8px #ffffff; }
        
        /* Typography adjustments */
        .large-text { font-size: 1.25rem; }
    </style>
</head>
<body class="p-4 md:p-10 flex justify-center min-h-screen text-gray-800">
    <div class="w-full max-w-5xl neumo-card p-10">
        <!-- Header Section -->
        <header class="flex flex-col md:flex-row justify-between items-start mb-10 border-b border-gray-300 pb-8">
            <div>
                <h1 class="text-5xl font-black text-blue-700">รูด 2 ตัว</h1>
                <p id="clock" class="text-xl font-bold text-gray-600 mt-2 tracking-wide"></p>
            </div>
            <div class="flex gap-6 mt-6 md:mt-0">
                <div class="text-center px-8 py-4 neumo-card w-40">
                    <p class="text-xs text-green-700 font-black uppercase tracking-wider">เข้า</p>
                    <p class="text-4xl font-black text-green-700" id="hitCount">0</p>
                    <p class="text-sm font-bold text-green-600" id="hitRate">0%</p>
                </div>
                <div class="text-center px-8 py-4 neumo-card w-40">
                    <p class="text-xs text-red-700 font-black uppercase tracking-wider">หลุด</p>
                    <p class="text-4xl font-black text-red-700" id="missCount">0</p>
                    <p class="text-sm font-bold text-red-600" id="missRate">0%</p>
                </div>
            </div>
        </header>

        <div class="grid md:grid-cols-3 gap-10">
            <!-- Sidebar: Formula Input -->
            <div class="md:col-span-1 space-y-8">
                <div class="bg-blue-600 p-8 rounded-[30px] shadow-lg text-white">
                    <p class="text-blue-100 text-sm font-bold uppercase tracking-widest">เลขเด่น/รอง รอบถัดไป</p>
                    <div class="text-7xl font-black my-6" id="currentFormula">-</div>
                    <button onclick="switchFormula()" class="w-full py-5 bg-white text-blue-700 rounded-2xl text-xl font-black neumo-btn">สลับสูตร</button>
                </div>

                <div>
                    <label class="block text-xl font-black text-gray-700 mb-4 ml-1">กรอกผล 5 ตัวล่าสุด</label>
                    <input type="number" id="fullInput" maxlength="5" oninput="if(this.value.length === 5) analyze()" 
                        placeholder="12345" class="w-full p-8 neumo-input rounded-3xl text-5xl font-black tracking-[0.5em] text-center outline-none text-gray-800">
                </div>
            </div>

            <!-- Main: Statistics Table -->
            <div class="md:col-span-2">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black text-gray-800">ตารางสถิติ <span class="text-lg font-bold text-gray-500 ml-3">(ไหล: <span id="flowNumbers" class="text-blue-700 text-xl font-black">-</span>)</span></h2>
                    <div class="flex gap-4">
                        <button onclick="copyToLine()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl text-lg font-bold neumo-btn">คัดลอกลงไลน์</button>
                        <button onclick="clearHistory()" class="bg-gray-200 text-gray-700 px-8 py-4 rounded-2xl text-lg font-bold neumo-btn">ล้าง</button>
                    </div>
                </div>

                <div class="neumo-card overflow-hidden">
                    <table class="w-full text-xl font-bold text-gray-700">
                        <thead class="text-gray-500 uppercase text-sm border-b border-gray-300">
                            <tr>
                                <th class="p-6 text-left">รอบ</th>
                                <th class="p-6 text-left">สูตร</th>
                                <th class="p-6 text-left">ผล</th>
                                <th class="p-6 text-left">สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable" class="divide-y divide-gray-300"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <textarea id="tempClipboard" style="position: absolute; left: -9999px;"></textarea>

    <script>
        let history = []; let hits = 0; let misses = 0;
        let formulaMode = 0; 

        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('clock').innerText = `${dateStr} | ${timeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateStats() {
            const total = hits + misses;
            document.getElementById('hitCount').innerText = hits;
            document.getElementById('missCount').innerText = misses;
            document.getElementById('hitRate').innerText = total > 0 ? ((hits/total)*100).toFixed(0) + '%' : '0%';
            document.getElementById('missRate').innerText = total > 0 ? ((misses/total)*100).toFixed(0) + '%' : '0%';
        }

        function switchFormula() {
            formulaMode = (formulaMode + 1) % 2;
            alert("สลับสูตรเรียบร้อย! (โหมด: " + (formulaMode === 0 ? "ผลรวม" : "หลักหน่วย") + ")");
        }

        function calculateFlow() {
            if (history.length === 0) return "-";
            const counts = {};
            history.forEach(h => {
                h.result.replace('-', '').split('').forEach(digit => {
                    counts[digit] = (counts[digit] || 0) + 1;
                });
            });
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            return sorted.length >= 2 ? `${sorted[0][0]}, ${sorted[1][0]}` : "-";
        }

        function analyze() {
            const val = document.getElementById('fullInput').value;
            if(val.length !== 5) return;
            const top3 = val.substring(0, 3); const bot2 = val.substring(3, 5);

            if (history.length > 0 && history[0].status === "รอดูผล") {
                const check = val.includes(history[0].strong) || val.includes(history[0].weak);
                history[0].status = check ? "✅" : "❌";
                if(check) hits++; else misses++;
                updateStats();
            }

            let strong, weak;
            if(formulaMode === 0) {
                const sum = parseInt(top3) + parseInt(bot2);
                strong = (sum % 10).toString();
            } else {
                strong = ((parseInt(top3.slice(-1)) + parseInt(bot2.slice(-1))) % 10).toString();
            }
            weak = ((parseInt(strong) + 1) % 10).toString();

            document.getElementById('currentFormula').innerText = `${strong}, ${weak}`;
            history.unshift({ round: history.length + 1, formula: `${strong}, ${weak}`, result: `${top3}-${bot2}`, status: "รอดูผล", strong, weak });
            
            document.getElementById('flowNumbers').innerText = calculateFlow();
            renderTable(); document.getElementById('fullInput').value = "";
        }

        function renderTable() {
            const tbody = document.getElementById('historyTable');
            tbody.innerHTML = history.slice(0, 10).map(item => `
                <tr class="hover:bg-white/50 transition text-lg">
                    <td class="p-6 text-gray-700">${item.round}</td>
                    <td class="p-6 text-blue-700 font-black">${item.formula}</td>
                    <td class="p-6 text-gray-800">${item.result}</td>
                    <td class="p-6 font-black ${item.status === '✅' ? 'text-green-600' : item.status === '❌' ? 'text-red-600' : 'text-gray-400'}">${item.status}</td>
                </tr>`).join('');
        }

        function copyToLine() {
            if(history.length === 0) return;
            const h = history[0];
            const flow = document.getElementById('flowNumbers').innerText;
            const text = `รูด 2 ตัว
รอบ=${h.round}
สูตร=${h.formula}
ผล=${h.result}
สถานะ=${h.status}
เลขไหล=${flow}

📌 สูตรการเล่น: รูด 19 ประตู เน้นหลักสิบและหลักหน่วย บน-ล่าง`;
            const t = document.getElementById('tempClipboard');
            t.value = text; t.select(); document.execCommand('copy'); alert("คัดลอกลงไลน์เรียบร้อย!");
        }

        function clearHistory() { 
            if(confirm("ล้างสถิติทั้งหมด?")) { 
                history = []; 
                hits = 0; 
                misses = 0; 
                updateStats(); 
                renderTable(); 
                document.getElementById('currentFormula').innerText = "-"; 
                document.getElementById('flowNumbers').innerText = "-"; 
            } 
        }
    </script>
</body>
